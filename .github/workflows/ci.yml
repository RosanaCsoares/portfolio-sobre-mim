name: Pipeline CI-CD

on:
  push:
    branches:
      - main

jobs:

  teste:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Executar testes
        run: |
          chmod +x test.sh
          ./test.sh

  build:
    needs: teste
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v5

      - name: Build da imagem Docker
        run: |
          docker build -t portfolio .